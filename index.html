<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoMath App</title>

    <link rel="stylesheet" href="styles.css">

    <!-- DESMOS -->
    <script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=95ae3c138c5845289c3d45408fc8839f"></script>
</head>

<body>

<!-- ===================== -->
<!-- SIDEBAR -->
<!-- ===================== -->
<div class="sidebar" id="sidebar">
    <button class="toggle-btn" id="toggleBtn">≡</button>

    <ul class="menu">
        <li><button class="menu-item">🏠 <span>Inicio</span></button></li>

        <li class="has-submenu">
            <button class="menu-item">📘 <span>Métodos</span><span class="arrow">▸</span></button>

            <ul class="submenu">

                <li class="has-submenu">
                    <button class="menu-item">🔒 <span>Cerrados</span><span class="arrow">▸</span></button>
                    <ul class="submenu">
                        <li><button class="menu-item">Bisección</button></li>
                        <li><button class="menu-item">Regla Falsa</button></li>
                    </ul>
                </li>

                <li class="has-submenu">
                    <button class="menu-item">🔓 <span>Abiertos</span><span class="arrow">▸</span></button>
                    <ul class="submenu">
                        <li><button class="menu-item">Newton Raphson</button></li>
                        <li><button class="menu-item">Secante</button></li>
                        <li><button class="menu-item">Punto Fijo</button></li>
                    </ul>
                </li>

            </ul>
        </li>

        <li><button class="menu-item">📈 <span>Taylor</span></button></li>
        <li><button class="menu-item">⚙️ <span>Configuración</span></button></li>
    </ul>
</div>

<!-- ===================== -->
<!-- CONTENIDO PRINCIPAL -->
<!-- ===================== -->
<div class="content">

    <div class="main-layout">

        <!-- ===================== -->
        <!-- IZQUIERDA -->
        <!-- ===================== -->
        <div class="left-panel">

            <h1 class="title">GeoMath - Calculadora y Graficador</h1>

            <!-- CALCULADORA -->
            <h2>🧮 Calculadora Científica</h2>
            <div id="cientifica" class="box"></div>

            <!-- GRAFICADOR -->
            <h2>📊 Graficador</h2>
            <div id="grafica" class="box"></div>

        </div>

        <!-- ===================== -->
        <!-- DERECHA -->
        <!-- ===================== -->
        <div class="right-panel">

            <div class="panel">

                <h3>Iteraciones</h3>

                <!-- INPUTS DINÁMICOS -->
                <div class="inputs-metodo" id="inputs-metodo">

                    <div id="input-a-group">
                        <label>a:</label>
                        <input type="number" id="input-a">
                    </div>

                    <div id="input-b-group">
                        <label>b:</label>
                        <input type="number" id="input-b">
                    </div>

                    <div id="input-x0-group">
                        <label>x₀:</label>
                        <input type="number" id="input-x0">
                    </div>

                    <button id="btn-iterar">▶ Iterar</button>

                </div>

                <!-- TABLA -->
                <div class="table-container">
                    <table id="tabla-iteraciones">
                        <thead></thead>
                        <tbody></tbody>
                    </table>
                </div>

            </div>

        </div>

    </div>

</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
