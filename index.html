<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoMath App</title>

    <link rel="stylesheet" href="styles.css">

    <!-- MathQuill -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mathquill/0.10.1/mathquill.css"/>

    <!-- MathJax -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>

<div class="sidebar" id="sidebar">
    <button class="toggle-btn" id="toggleBtn">≡</button>

    <ul class="menu">

        <li><span>🏠</span> <span>Inicio</span></li>

        <li class="has-submenu">
            <div class="menu-item">
                📘 <span>Métodos</span>
                <span class="arrow">▸</span>
            </div>

            <ul class="submenu">

                <li class="has-submenu">
                    <div class="menu-item">
                        🔒 <span>Cerrados</span>
                        <span class="arrow">▸</span>
                    </div>

                    <ul class="submenu">
                        <li>Bisección</li>
                        <li>Regla Falsa</li>
                    </ul>
                </li>

                <li class="has-submenu">
                    <div class="menu-item">
                        🔓 <span>Abiertos</span>
                        <span class="arrow">▸</span>
                    </div>

                    <ul class="submenu">
                        <li>Newton Raphson</li>
                        <li>Secante</li>
                    </ul>
                </li>

            </ul>
        </li>

        <li><span>📈</span> <span>Taylor</span></li>
        <li><span>⚙️</span> <span>Configuración</span></li>

    </ul>
</div>

<div class="content">

    <h1 class="title">Editor Matemático</h1>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <button onclick="insertCmd('\\frac')" title="Fracción">𝒂/𝒃</button>
        <button onclick="insertCmd('^')" title="Potencia">x²</button>
        <button onclick="insertCmd('\\sqrt')" title="Raíz">√</button>

        <div class="divider"></div>

        <button onclick="insertCmd('\\pi')" title="Pi">π</button>
        <button onclick="insertText('e')" title="Euler">e</button>

        <div class="divider"></div>

        <button onclick="insertCmd('\\sin')" title="Seno">sin</button>
        <button onclick="insertCmd('\\cos')" title="Coseno">cos</button>
        <button onclick="insertCmd('\\tan')" title="Tangente">tan</button>

        <div class="divider"></div>

        <button onclick="insertText('x')">x</button>
        <button onclick="insertText('+')">+</button>
        <button onclick="insertText('-')">-</button>

        <div class="divider"></div>

        <button class="clear-btn" onclick="clearMath()">C</button>
    </div>

    <div id="math-field" class="math-box"></div>

    <div class="panels">
        <div class="panel">
            <h3>LaTeX</h3>
            <div id="latex-output"></div>
        </div>

        <div class="panel">
            <h3>Vista Matemática</h3>
            <div id="math-preview"></div>
        </div>
    </div>

</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathquill/0.10.1/mathquill.min.js"></script>
<script src="script.js"></script>

</body>
</html>
