<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoMath Pro</title>

    <link rel="stylesheet" href="styles.css">

    <!-- DESMOS -->
    <script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=95ae3c138c5845289c3d45408fc8839f"></script>
</head>

<body>

<!-- ===================== -->
<!-- HEADER PRO -->
<!-- ===================== -->
<div class="header-pro">
    <h1>GeoMath</h1>
    <p>Calculadora numérica + visualización de raíces</p>
</div>

<!-- ===================== -->
<!-- CONTENEDOR PRINCIPAL -->
<!-- ===================== -->
<div class="container">

    <!-- ===================== -->
    <!-- INPUT FUNCIÓN -->
    <!-- ===================== -->
    <div class="card">
        <h2> Escriba su función acá:</h2>
        <div id="cientifica"></div>
    </div>

    <!-- ===================== -->
    <!-- GRÁFICA -->
    <!-- ===================== -->
    <div class="card">
        <h2> Gráfica de la función</h2>
        <div id="grafica"></div>
    </div>

    <!-- ===================== -->
    <!-- CONTROLES -->
    <!-- ===================== -->
    <div class="card controls">

        <h2> Método numérico</h2>

        <div class="selector-metodo">
            <button class="metodo-btn" data-metodo="biseccion">Bisección</button>
            <button class="metodo-btn" data-metodo="reglaFalsa">Regla Falsa</button>
            <button class="metodo-btn" data-metodo="newton">Newton</button>
            <button class="metodo-btn" data-metodo="secante">Secante</button>
        </div>

        <div class="inputs-metodo" id="inputs-metodo">

            <div id="input-a-group">
                <label>a:</label>
                <input type="number" id="input-a">
            </div>

            <div id="input-b-group">
                <label>b:</label>
                <input type="number" id="input-b">
            </div>

            <div id="input-x0-group">
                <label>x₀:</label>
                <input type="number" id="input-x0">
            </div>

            <button id="btn-iterar">▶ Ejecutar método</button>

        </div>

    </div>

    <!-- ===================== -->
    <!-- RESULTADO -->
    <!-- ===================== -->
    <div class="card resultado-box" id="resultado-box">
        <h2> Resultado</h2>
        <p id="resultado-text">Aquí aparecerá la raíz aproximada...</p>
    </div>

    <!-- ===================== -->
    <!-- TABLA -->
    <!-- ===================== -->
    <div class="card">
        <h2> Tabla de iteraciones</h2>

        <div class="table-container">
            <table id="tabla-iteraciones">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
